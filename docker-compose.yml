services:
  db:
    image: postgres:16-alpine
    container_name: easecook-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-easecook}
      POSTGRES_USER: ${POSTGRES_USER:-easecook}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-easecook}
    ports:
      - "5432:5432"
    volumes:
      - easecook_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: easecook-backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: easecook-frontend
    command: npm run dev -- --host 0.0.0.0
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api}
    depends_on:
      - backend

volumes:
  easecook_postgres_data:
  frontend_node_modules:
